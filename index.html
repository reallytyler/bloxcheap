<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Cheap | Premium Roblox Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f9fafb; scroll-behavior: smooth; }
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tos-box { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); height: 200px; overflow-y: scroll; }
        .featured-card { transform: scale(1.1); border-color: rgba(34, 197, 94, 0.4) !important; z-index: 10; opacity: 1 !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .verified-badge { width: 16px; height: 16px; display: inline-block; }
        .msg-bubble { background: rgba(255, 255, 255, 0.03); padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 3px solid #22c55e; transition: all 0.3s; }
        .msg-bubble:hover { background: rgba(255, 255, 255, 0.06); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="w-full max-w-7xl mx-auto px-6 py-8 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="https://pare.ct.ws/robux.png" alt="Blox Cheap" class="w-10 h-10">
            <span class="text-2xl font-extrabold tracking-tighter uppercase">Blox<span class="text-green-500">Cheap</span></span>
        </div>
        <a href="https://discord.com" class="bg-[#282b30] hover:bg-[#1e2124] transition-all flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-bold">
            <img src="https://cdn.solo.to/images/social/discord-act-nofill.svg" class="w-5 h-5 invert" alt="Discord">
            @gngabrisi
        </a>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto px-6 w-full pt-6">
        <!-- Stats -->
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-4 tracking-tight">The best way to buy <span class="text-green-500 italic">Robux & Items.</span></h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto mt-12">
                <div class="glass-panel p-8 rounded-3xl">
                    <p class="text-gray-500 text-xs font-black uppercase mb-2">Live Stock</p>
                    <div class="flex items-center justify-center gap-2 text-4xl font-black">
                        <img src="https://pare.ct.ws/robux.png" class="w-8 h-8"> <span id="stock-val">...</span>
                    </div>
                </div>
                <div class="glass-panel p-8 rounded-3xl">
                    <p class="text-gray-500 text-xs font-black uppercase mb-2">Total Sold</p>
                    <div class="flex items-center justify-center gap-2 text-4xl font-black text-green-500">
                        <span id="sold-val">...</span> <span class="text-lg text-gray-400">R$</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vouches -->
        <section class="relative mb-24">
            <div class="text-center mb-12"><h2 class="text-3xl font-bold">Customer Vouches</h2></div>
            <div id="review-slider" class="flex items-center gap-8 overflow-x-auto hide-scrollbar scroll-smooth py-12 px-10">
                <p class="w-full text-center text-gray-500 italic">Loading reviews...</p>
            </div>
        </section>


    <footer class="w-full border-t border-white/5 bg-[#010307] py-12 px-6">
        <div class="max-w-6xl mx-auto flex flex-col items-center">
            <div class="mb-10 text-center">
                <p class="text-[10px] font-black uppercase tracking-[0.4em] text-gray-600 mb-6">Payment Methods</p>
                <div class="flex items-center gap-4">
                    <img src="https://download.logo.wine/logo/BKash/BKash-bKash-Logo.wine.png" alt="bKash" class="h-10 opacity-60">
                    <span class="text-sm font-bold text-gray-500">Pay with bKash</span>
                </div>
            </div>
            <div class="text-gray-600 text-[10px] uppercase font-bold tracking-widest">&copy; 2024 Blox Cheap Marketplace</div>
        </div>
        <a href="terms/">Terms</a> | <a href="privacy/">Privacy</a>
    </footer>

    <script>

        async function loadSiteData() {
            try {
                const response = await fetch('https://reallytyler.github.io/.well-known/data.txt');
                const data = await response.json();
                document.getElementById('stock-val').innerText = data.stock;
                document.getElementById('sold-val').innerText = data.sold;

                const slider = document.getElementById('review-slider');
                slider.innerHTML = data.reviews.map(rev => `
                    <div class="glass-panel min-w-[320px] p-8 rounded-[2rem] ${rev.name.toLowerCase() === 'ankon' ? 'featured-card shadow-2xl shadow-green-500/10' : 'opacity-60'}">
                        <div class="flex items-center gap-4 mb-4">
                            <img src="${rev.avatar}" class="w-12 h-12 rounded-full border border-white/10">
                            <div>
                                <p class="font-bold flex items-center gap-1">${rev.name} <img src="https://cdn.solo.to/images/verified.svg" class="verified-badge"></p>
                                <div class="flex text-yellow-500 text-[8px] tracking-widest">${'<i class="fas fa-star"></i>'.repeat(rev.rating)}</div>
                            </div>
                        </div>
                        <p class="text-gray-400 text-sm leading-relaxed italic">"${rev.text}"</p>
                    </div>
                `).join('');
            } catch (e) { console.error("Error loading site data"); }
        }
    </script>
</body>
</html>
